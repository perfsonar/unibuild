name: Unbuild Docker Environments

# This action builds Docker images of unibuild for
# various OSes and then pushes result to GitHub
# Container Registry.

on:
  push:
    branches: [ '*' ]
    # Publish semver tags as releases.
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ 'main' ]
  workflow_dispatch:
    branches: [ '*' ]
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_BASE: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        os: [ 'ol8', 'el9', 'el10', 'u20', 'u22', 'u24', 'u26' ]
        arch: [ 'amd64', 'arm64' ]
        include:
          # Intel Runner: Compiles native x86 AND safely triggers emulated tasks for supported OS versions
          - arch: amd64
            runner: ubuntu-latest
            # The trick: Conditionally append arm/v7 and ppc64le ONLY if it's Ubuntu ('u')
            platforms: >-
              linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm64
            platforms: linux/arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.arch == 'amd64'
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4
        with:
          # Automatically preserves your default execution privileges while passing parameters
          buildkitd-flags: --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host
          # Tells QEMU/BuildKit to cleanly map 64-bit kernel filesystem structures down to a 32-bit layout
          buildkitd-config-inline: |
            [worker.containerd]
              prefer32 = true
 

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      #  uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_BASE }}/${{ matrix.os }}
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      #
      # Platform Builds
      #
      - name: Build and push images
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker-envs/Dockerfile-${{ matrix.os }}
          # Dynamically builds whatever platforms are defined for this specific runner/OS match
          platforms: >-
            ${{ matrix.platform }}${{ 
              (matrix.arch == 'amd64' && startsWith(matrix.os, 'u')) 
              && ',linux/arm/v7,linux/ppc64le' 
              || '' 
            }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

